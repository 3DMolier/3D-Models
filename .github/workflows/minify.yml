name: Minify CSS and JS

on:
  push:
    paths:
      - 'assets/css/styles.css'
      - 'assets/js/*.js'

jobs:
  minify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install tools
        run: npm install -g csso-cli terser
      - name: Minify CSS
        run: csso assets/css/styles.css --output assets/css/styles.min.css --comments none
      - name: Minify JS
        run: |
          for f in assets/js/site.js assets/js/catalog.js assets/js/search.js assets/js/category-pages.js assets/js/full-catalog.js; do
            [ -f "$f" ] && terser "$f" -o "${f%.js}.min.js" --compress --mangle
          done
      - name: Commit minified files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/css/styles.min.css assets/js/*.min.js 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-minify CSS and JS [skip ci]"
          git push
